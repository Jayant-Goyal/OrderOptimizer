<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Optimizer</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- Icons ---
    const TrashIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>);
    const PlusIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
    const MinusIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
    const SwitchIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>);
    const InfoIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);
    const SparklesIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>);
    const ZapIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>);
    const AlertIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);
    const CopyIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);
    const CheckIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>);

    // --- Core Algorithms ---
    const sortItemsSafe = (a, b) => {
      if (a.type === b.type) return 0;
      return a.type === 'must' ? -1 : 1;
    };

    const findOptimalGrouping = (items, targetCents) => {
      const N = items.length;
      let minimalMasks = [];
      for (let i = 1; i < (1 << N); i++) {
        let sum = 0, fillersCount = 0;
        for (let j = 0; j < N; j++) {
          if ((i & (1 << j))) {
            sum += Math.round(items[j].price * 100);
            if (items[j].type === 'filler') fillersCount++;
          }
        }
        if (sum >= targetCents) {
          let isMinimal = true;
          for (let j = 0; j < N; j++) {
            if ((i & (1 << j))) {
              if (sum - Math.round(items[j].price * 100) >= targetCents) { isMinimal = false; break; }
            }
          }
          if (isMinimal) minimalMasks.push({ mask: i, sum: sum, fillers: fillersCount });
        }
      }

      let memo = new Map();
      const isBetter = (cand, best) => {
        if (cand.orders !== best.orders) return cand.orders > best.orders; 
        if (cand.overshoot !== best.overshoot) return cand.overshoot < best.overshoot; 
        if (cand.fillers !== best.fillers) return cand.fillers < best.fillers; 
        return false;
      };

      const solve = (availableMask) => {
        if (availableMask === 0) return { orders: 0, overshoot: 0, fillers: 0, selectedMasks: [] };
        if (memo.has(availableMask)) return memo.get(availableMask);

        let best = { orders: 0, overshoot: 0, fillers: 0, selectedMasks: [] };
        let firstBit = -1;
        for(let i = 0; i < N; i++) { if (availableMask & (1 << i)) { firstBit = i; break; } }
        if (firstBit === -1) return best;

        best = solve(availableMask ^ (1 << firstBit));
        for (let m of minimalMasks) {
          if ((m.mask & (1 << firstBit)) && ((m.mask & availableMask) === m.mask)) {
            let subRes = solve(availableMask ^ m.mask);
            let cand = { orders: subRes.orders + 1, overshoot: subRes.overshoot + (m.sum - targetCents), fillers: subRes.fillers + m.fillers, selectedMasks: [...subRes.selectedMasks, m.mask] };
            if (isBetter(cand, best)) best = cand;
          }
        }
        memo.set(availableMask, best);
        return best;
      };

      const result = solve((1 << N) - 1);
      let orders = [], usedMask = 0;
      result.selectedMasks.forEach(mask => {
        usedMask |= mask;
        let orderItems = [];
        for(let i=0; i<N; i++) { if (mask & (1 << i)) orderItems.push(items[i]); }
        orderItems.sort(sortItemsSafe);
        orders.push({ id: Math.random().toString(36).substring(2, 11), items: orderItems, total: orderItems.reduce((s, i) => s + i.price, 0) });
      });

      let partialMustHaves = [];
      for(let i=0; i<N; i++) { if (!(usedMask & (1 << i)) && items[i].type === 'must') partialMustHaves.push(items[i]); }
      return { orders, partialMustHaves };
    };

    const findGreedyGrouping = (remainingMust, remainingFillers, targetCents) => {
      let orders = [];
      while (remainingMust.length > 0) {
        let itemsToConsider = [...remainingMust, ...remainingFillers];
        let totalCents = itemsToConsider.reduce((sum, i) => sum + Math.round(i.price * 100), 0);
        if (totalCents < targetCents) break;

        let maxPriceCents = Math.max(...itemsToConsider.map(i => Math.round(i.price * 100)));
        let limit = targetCents + maxPriceCents; 
        if (limit > 5000000) return { error: "Items exceed calculation limits. Try lower prices." };

        let dp = new Array(limit + 1).fill(null);
        dp[0] = { items: [], mustCount: 0, fillerCount: 0 };

        for (let i = 0; i < itemsToConsider.length; i++) {
          let item = itemsToConsider[i];
          let p = Math.round(item.price * 100);
          let isMust = item.type === 'must' ? 1 : 0;
          let isFiller = item.type === 'filler' ? 1 : 0;

          for (let v = limit; v >= p; v--) {
            if (dp[v - p] !== null) {
              let newMust = dp[v - p].mustCount + isMust;
              let newFiller = dp[v - p].fillerCount + isFiller;
              let shouldUpdate = false;
              if (dp[v] === null) shouldUpdate = true;
              else {
                if (newFiller < dp[v].fillerCount) shouldUpdate = true;
                else if (newFiller === dp[v].fillerCount && newMust > dp[v].mustCount) shouldUpdate = true;
              }
              if (shouldUpdate) dp[v] = { items: [...dp[v - p].items, item], mustCount: newMust, fillerCount: newFiller };
            }
          }
        }

        let foundBest = null;
        for (let v = targetCents; v <= limit; v++) {
          if (dp[v] !== null && dp[v].mustCount > 0) { foundBest = dp[v].items; break; }
        }
        if (!foundBest) break;

        foundBest.sort(sortItemsSafe);
        orders.push({ id: Math.random().toString(36).substring(2, 11), items: foundBest, total: foundBest.reduce((s, i) => s + i.price, 0) });

        foundBest.forEach(used => {
          if (used.type === 'must') {
            let idx = remainingMust.findIndex(m => m.uniqueId === used.uniqueId);
            if (idx !== -1) remainingMust.splice(idx, 1);
          } else {
            let idx = remainingFillers.findIndex(f => f.uniqueId === used.uniqueId);
            if (idx !== -1) remainingFillers.splice(idx, 1);
          }
        });
      }
      return { orders, partialMustHaves: remainingMust };
    };

    const calculateOptimization = (mustHaves, fillers, targetAmount) => {
      if (!targetAmount || targetAmount <= 0) return { error: "Please enter a valid target amount." };
      const targetCents = Math.round(targetAmount * 100);
      if (targetCents > 1000000) return { error: "Target amount is too high (Max ₹10,000)." };

      let remainingMust = [];
      mustHaves.forEach(item => { for (let i = 0; i < item.qty; i++) remainingMust.push({ ...item, type: 'must', uniqueId: Math.random().toString(36).substring(2, 11) }); });

      let remainingFillers = [];
      fillers.forEach(item => { for (let i = 0; i < item.qty; i++) remainingFillers.push({ ...item, type: 'filler', uniqueId: Math.random().toString(36).substring(2, 11) }); });

      const totalItemsCount = remainingMust.length + remainingFillers.length;
      if (totalItemsCount > 150) return { error: "Too many total items. Please reduce your quantities (Max 150 items)." };

      if (totalItemsCount <= 15) {
        return { ...findOptimalGrouping([...remainingMust, ...remainingFillers], targetCents), algorithm: 'optimal' };
      } else {
        const greedyResult = findGreedyGrouping(remainingMust, remainingFillers, targetCents);
        if (greedyResult.error) return greedyResult;
        return { ...greedyResult, algorithm: 'greedy' };
      }
    };

    function App() {
      const [items, setItems] = useState(() => { const saved = localStorage.getItem('optimizer_items'); return saved ? JSON.parse(saved) : []; });
      const [targetAmount, setTargetAmount] = useState(() => { const saved = localStorage.getItem('optimizer_target'); return saved ? parseFloat(saved) : 249; });
      const [discountValue, setDiscountValue] = useState(() => { const saved = localStorage.getItem('optimizer_discount'); return saved ? parseFloat(saved) : 50; });
      const [ignoreFillers, setIgnoreFillers] = useState(() => { const saved = localStorage.getItem('optimizer_ignore_fillers'); return saved === 'true'; });

      const [activeTab, setActiveTab] = useState('must');
      const [results, setResults] = useState(null);
      const [appError, setAppError] = useState(null);
      const [copiedId, setCopiedId] = useState(null);
      const [confirmModal, setConfirmModal] = useState(null);
      const [newItem, setNewItem] = useState({ name: '', price: '', qty: 1 });
      const [moveState, setMoveState] = useState({ itemId: null, qty: 1 });

      const quickFillers = [ { name: 'Candy', price: 5 }, { name: 'Eraser', price: 10 }, { name: 'Tape', price: 15 }, { name: 'Notebook', price: 30 }, { name: 'Snack', price: 50 } ];

      useEffect(() => {
        localStorage.setItem('optimizer_items', JSON.stringify(items));
        localStorage.setItem('optimizer_target', targetAmount.toString());
        localStorage.setItem('optimizer_discount', discountValue.toString());
        localStorage.setItem('optimizer_ignore_fillers', ignoreFillers.toString());
      }, [items, targetAmount, discountValue, ignoreFillers]);

      const mustHaves = items.filter(i => i.type === 'must');
      const fillers = items.filter(i => i.type === 'filler');

      const addSpecificItem = (name, price, qty, type) => {
        const parsedPrice = parseFloat(price); const parsedQty = parseInt(qty);
        const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase() && i.price === parsedPrice && i.type === type);
        if (existing) setItems(items.map(i => i.id === existing.id ? { ...i, qty: i.qty + parsedQty } : i));
        else setItems([...items, { id: Math.random().toString(36).substring(2, 11), name, price: parsedPrice, qty: parsedQty, type }]);
        setResults(null); setAppError(null);
      };

      const handleAddItem = (e) => {
        e.preventDefault();
        if (!newItem.name || !newItem.price || newItem.qty < 1) return;
        addSpecificItem(newItem.name, newItem.price, newItem.qty, activeTab);
        setNewItem({ name: '', price: '', qty: 1 });
      };

      const removeItem = (id) => { setItems(items.filter(item => item.id !== id)); if (moveState.itemId === id) setMoveState({ itemId: null, qty: 1 }); setResults(null); setAppError(null); };

      const clearTab = (type) => { setConfirmModal({ title: `Clear Tab`, message: `Delete all items here?`, action: () => { setItems(items.filter(item => item.type !== type)); setResults(null); } }); };
      const clearAll = () => { setConfirmModal({ title: 'Clear List', message: 'Permanently delete all items?', action: () => { setItems([]); setResults(null); } }); };

      const updateQuantity = (id, delta) => { setItems(items.map(item => { if (item.id === id) { const newQty = item.qty + delta; return { ...item, qty: newQty > 0 ? newQty : 1 }; } return item; })); setResults(null); };
      const initiateMove = (item) => { setMoveState({ itemId: item.id, qty: 1 }); };
      const confirmMove = () => {
        const { itemId, qty } = moveState; const itemToMove = items.find(i => i.id === itemId);
        if (!itemToMove || qty < 1 || qty > itemToMove.qty) return;
        const targetType = itemToMove.type === 'must' ? 'filler' : 'must';
        const existingTarget = items.find(i => i.name === itemToMove.name && i.price === itemToMove.price && i.type === targetType);
        let newItems = [...items];
        if (qty === itemToMove.qty) newItems = newItems.filter(i => i.id !== itemId); else newItems = newItems.map(i => i.id === itemId ? { ...i, qty: i.qty - qty } : i);
        if (existingTarget) newItems = newItems.map(i => i.id === existingTarget.id ? { ...i, qty: i.qty + qty } : i); else newItems.push({ ...itemToMove, id: Math.random().toString(36).substring(2, 11), qty: qty, type: targetType });
        setItems(newItems); setMoveState({ itemId: null, qty: 1 }); setResults(null);
      };

      const optimize = () => { setAppError(null); try { const activeFillers = ignoreFillers ? [] : fillers; const res = calculateOptimization(mustHaves, activeFillers, targetAmount); if (res.error) { setAppError(res.error); setResults(null); } else { setResults(res); } } catch (err) { setAppError("Calculation failed: " + err.message); setResults(null); } };

      const handleCopy = (order, groupedItems, index) => {
        let text = `🛍️ Optimized Order #${index + 1}\nTarget: ₹${targetAmount.toFixed(2)} | Total: ₹${order.total.toFixed(2)}\n---------------------------\n`;
        groupedItems.forEach(i => { text += `[ ] ${i.qty}x ${i.name} (₹${i.price.toFixed(2)} ea)\n`; });
        if (discountValue > 0) { text += `---------------------------\nNet Cost: ₹${Math.max(0, order.total - discountValue).toFixed(2)}\n`; }
        try { navigator.clipboard.writeText(text); setCopiedId(order.id); setTimeout(() => setCopiedId(null), 2000); } catch (e) {
          const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea); textArea.select();
          try { document.execCommand('copy'); setCopiedId(order.id); setTimeout(() => setCopiedId(null), 2000); } catch (err) { setAppError("Unable to copy to clipboard."); }
          document.body.removeChild(textArea);
        }
      };

      const groupedPartialItems = useMemo(() => {
        if (!results || !results.partialMustHaves) return [];
        let map = new Map();
        results.partialMustHaves.forEach(item => {
          if (map.has(item.name)) { const existing = map.get(item.name); existing.qty += 1; existing.total += item.price; } 
          else { map.set(item.name, { ...item, qty: 1, total: item.price }); }
        });
        return Array.from(map.values());
      }, [results]);

      const ActionButtons = ({ item, isDesktop, type }) => (
        <div className={`flex items-center gap-1.5 ${isDesktop ? 'hidden sm:flex border-l pl-3 border-gray-100' : 'sm:hidden'}`}>
          <button onClick={() => initiateMove(item)} className={`p-1.5 rounded-lg transition-colors ${moveState.itemId === item.id ? 'bg-indigo-100 text-indigo-700' : 'text-gray-400 hover:text-indigo-600 hover:bg-indigo-50'}`}><SwitchIcon className="w-4 h-4" /></button>
          <button onClick={() => removeItem(item.id)} className="text-gray-400 hover:text-red-600 p-1.5 hover:bg-red-50 rounded-lg transition-colors"><TrashIcon className="w-4 h-4" /></button>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-900 selection:bg-indigo-100 pb-12">
          {confirmModal && (
            <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 animate-in zoom-in-95 duration-200">
                <div className="flex items-center gap-3 mb-4 text-red-600"><AlertIcon className="w-6 h-6" /><h3 className="text-lg font-bold text-gray-900">{confirmModal.title}</h3></div>
                <p className="text-gray-600 mb-6 text-sm">{confirmModal.message}</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setConfirmModal(null)} className="px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-100 rounded-xl font-semibold transition-colors">Cancel</button>
                  <button onClick={() => { confirmModal.action(); setConfirmModal(null); }} className="px-4 py-2.5 text-sm bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-colors shadow-sm">Yes, Delete</button>
                </div>
              </div>
            </div>
          )}

          <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-indigo-600 text-white rounded-lg shadow-sm"><SparklesIcon /></div>
                <div><h1 className="text-xl md:text-2xl font-bold text-gray-900 leading-tight">Discount Order Optimizer</h1></div>
